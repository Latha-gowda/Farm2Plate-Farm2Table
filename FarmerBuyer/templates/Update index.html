<!DOCTYPE html>
<html>
<head>
    <title>Community-Based Farmer Marketplace</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4CAF50, #8BC34A);
            text-align: center;
            color: white;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 100px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            margin: 15px;
            font-size: 18px;
            text-decoration: none;
            color: #4CAF50;
            background-color: white;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #2E7D32;
            color: white;
        }

        footer {
            position: fixed;
            bottom: 10px;
            width: 100%;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Community-Based Farmer Marketplace 🌾</h1>

        <a href="/farmer_register" class="btn">Farmer Register</a>
        <a href="/buyer_register" class="btn">Buyer Register</a>
        <br>
        <a href="/farmer_login" class="btn">Farmer Login</a>
        <a href="/buyer_login" class="btn">Buyer Login</a>
    </div>

    <footer>
        Built for direct farmer-to-buyer connection 🚜
    </footer>

</body>
</html>
